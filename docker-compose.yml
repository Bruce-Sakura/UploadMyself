# UploadMyself — 全栈编排（SQLite，全功能含 GPU ML）
# 运行时数据集中在 ${UPLOADMYSELF_HOME}/data（默认 ~/.UploadMyself，由 install.sh 写入 .env）。
# 数据库为 SQLite 单文件，无需独立数据库容器。
services:
  # ===== Backend (Go + Python ML/CharacterGen, GPU) =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      APP_PORT: "8000"
      PYTHON_BIN: "python3"
      ML_SCRIPTS_DIR: "/app/ml/scripts"
      SKILLS_DIR: "/app/skills"
      UPLOAD_DIR: "/app/uploads"
      DB_PATH: "/app/data/uploadmyself.db"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://token-plan-sgp.xiaomimimo.com/v1}"
      LLM_MODEL: "${LLM_MODEL:-mimo-v2.5-pro}"
      # ML 服务与后端跑在同一容器（见 entrypoint.sh）
      ML_SERVICE_URL: "http://localhost:8001"
      # HuggingFace 模型缓存持久化到工作目录，避免每次重拉
      HF_HOME: "/root/.cache/huggingface"
    volumes:
      - ${UPLOADMYSELF_HOME}/data/uploads:/app/uploads
      - ${UPLOADMYSELF_HOME}/data/skills:/app/skills
      - ${UPLOADMYSELF_HOME}/data/db:/app/data
      - ${UPLOADMYSELF_HOME}/data/models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ===== Frontend (React + Nginx) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
