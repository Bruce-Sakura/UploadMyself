services:
  # ===== Database =====
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uploadmyself
      POSTGRES_PASSWORD: uploadmyself
      POSTGRES_DB: uploadmyself
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uploadmyself"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ===== Backend (Go + Python ML) =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: "8000"
      PYTHON_BIN: "python3"
      ML_SCRIPTS_DIR: "/app/ml/scripts"
      DB_DSN: "host=postgres user=uploadmyself password=uploadmyself dbname=uploadmyself port=5432 sslmode=disable"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://token-plan-sgp.xiaomimimo.com/v1}"
      LLM_MODEL: "${LLM_MODEL:-mimo-v2.5-pro}"
      ML_SERVICE_URL: "http://localhost:8001"
      SKILLS_DIR: "/app/skills"
    volumes:
      - uploads:/app/uploads
      - skills:/app/skills
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ===== Frontend (React + Nginx) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  skills:
